<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Controle Financeiro · Cinthia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --text: #f0eff6;
    --muted: #7b7a8e;
    --accent: #c9a96e;
    --accent2: #8b6fcb;
    --danger: #e06b6b;
    --success: #6bc98a;
    --mag: #4a9edd;
    --san: #e06b6b;
    --azu: #6bc98a;
    --ren: #c9a96e;
    --conta: #8b6fcb;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  nav button { flex: 1; padding: 12px 4px 10px; background: none; border: none; color: var(--muted); font-size: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color .2s; }
  nav button.active { color: var(--accent); }
  nav button svg { width: 20px; height: 20px; }

  /* HEADER */
  .app-header { padding: 52px 20px 20px; background: linear-gradient(180deg, #1a1a24 0%, var(--bg) 100%); }
  .app-header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); }
  .app-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* PAGES */
  .page { display: none; padding: 0 0 90px; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin: 0 16px 12px; overflow: hidden; }
  .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-header h3 { font-size: 13px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .card-body { padding: 16px; }

  /* RESUMO MENSAL */
  .month-selector { display: flex; gap: 8px; overflow-x: auto; padding: 16px 16px 4px; scrollbar-width: none; }
  .month-selector::-webkit-scrollbar { display: none; }
  .month-btn { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .month-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .total-hero { text-align: center; padding: 24px 16px 16px; }
  .total-hero .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .total-hero .amount { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--text); margin: 6px 0 2px; }
  .total-hero .sub { color: var(--muted); font-size: 12px; }

  .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .left { display: flex; align-items: center; gap: 10px; }
  .breakdown-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .breakdown-row .name { font-size: 13px; color: var(--text); }
  .breakdown-row .val { font-size: 13px; font-weight: 600; color: var(--text); }

  /* LISTA DE LANÇAMENTOS */
  .item-row { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .item-row:last-child { border-bottom: none; }
  .item-left .name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .item-left .meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .tag-parc { background: #2a3a50; color: var(--mag); }
  .tag-avista { background: #2a2a3a; color: var(--muted); }
  .tag-rec { background: #2a2040; color: var(--accent2); }
  .item-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
  .item-right .val { font-size: 14px; font-weight: 600; }
  .item-right .parcela { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .section-label { padding: 12px 16px 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* BADGE cartão */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-mag { background: rgba(74,158,221,.15); color: var(--mag); }
  .badge-san { background: rgba(224,107,107,.15); color: var(--san); }
  .badge-azu { background: rgba(107,201,138,.15); color: var(--azu); }
  .badge-ren { background: rgba(201,169,110,.15); color: var(--ren); }
  .badge-conta { background: rgba(139,111,203,.15); color: var(--conta); }

  /* FORMULÁRIO */
  .form-wrap { padding: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tipo-toggle { display: flex; gap: 8px; }
  .tipo-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; text-align: center; }
  .tipo-btn.active { border-color: var(--accent); background: rgba(201,169,110,.1); color: var(--accent); }
  .parc-fields { display: none; }
  .parc-fields.show { display: block; }
  .btn-primary { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #000; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
  .btn-primary:active { opacity: .8; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--success); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONTA PAGE */
  .conta-total { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 16px; }
  .conta-total .label { font-size: 12px; color: var(--muted); }
  .conta-total .val { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--accent); }

  /* PROGRESS BAR */
  .progress-wrap { margin: 0 16px 12px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 8px; transition: color .2s, background .2s; flex-shrink: 0; }
  .btn-del:active { color: var(--danger); background: rgba(224,107,107,.1); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .3; }

  select option { background: #18181f; }
  .btn-export { display: flex; align-items: center; justify-content: center; gap: 8px; width: calc(100% - 32px); margin: 0 16px 12px; padding: 14px; background: linear-gradient(135deg, #1a3a1a, #1e4d1e); border: 1px solid #2d6a2d; border-radius: var(--radius-sm); color: var(--success); font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity .2s; }
  .btn-export:active { opacity: .7; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="app-header">
  <h1>Controle Financeiro</h1>
  <p id="header-month">Carregando...</p>
</div>

<!-- PAGE: RESUMO -->
<div class="page active" id="page-resumo">
  <div class="month-selector" id="month-selector"></div>
  <div class="total-hero">
    <div class="label">Total do mês</div>
    <div class="amount" id="total-mes">R$ 0,00</div>
    <div class="sub" id="total-sub">cartões + conta fixa</div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Por cartão / origem</h3></div>
    <div class="card-body" id="breakdown-list"></div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Por categoria</h3></div>
    <div class="card-body" id="cat-list"></div>
  </div>
  <button class="btn-export" onclick="exportXLSX()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
    Exportar Planilha Excel
  </button>
</div>

<!-- PAGE: LANÇAMENTOS -->
<div class="page" id="page-lanc">
  <div class="month-selector" id="month-selector-2"></div>
  <div id="lanc-list"></div>
</div>

<!-- PAGE: NOVO -->
<div class="page" id="page-novo">
  <div class="card" style="margin-top:16px">
    <div class="card-header"><h3>Nova Compra</h3></div>
    <div class="form-wrap">
      <div class="form-group">
        <label>Cartão</label>
        <select id="f-cartao">
          <option value="MAGALU">Magalu</option>
          <option value="SANTANDER">Santander</option>
          <option value="AZUL ITAÚ">Azul Itaú</option>
          <option value="RENNER">Renner</option>
          <option value="CONTA">Conta (débito/pix)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Estabelecimento</label>
        <input type="text" id="f-estab" placeholder="Ex: Shopee, iFood..." autocomplete="off">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="f-cat">
          <option>Alimentação</option>
          <option>Beleza / Estética</option>
          <option>Casa / Outros</option>
          <option>Compras Online</option>
          <option>Educação / Cursos</option>
          <option>Educação / Livros</option>
          <option>Itens Casa</option>
          <option>Lazer / Viagem</option>
          <option>Moda / Vestuário</option>
          <option>Pet</option>
          <option>Saúde / Bem-estar</option>
          <option>Saúde / Farmácia</option>
          <option>Serviços</option>
          <option>Streaming / Assinaturas</option>
          <option>Tecnologia / Eletrônicos</option>
          <option>Transporte</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <div class="tipo-toggle">
          <div class="tipo-btn active" data-tipo="avista">À vista</div>
          <div class="tipo-btn" data-tipo="parcelado">Parcelado</div>
          <div class="tipo-btn" data-tipo="recorrente">Recorrente</div>
        </div>
      </div>
      <div class="form-group">
        <label>Valor da parcela (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" inputmode="decimal">
      </div>
      <div class="parc-fields form-group" id="parc-fields">
        <label>Parcelas</label>
        <div class="form-row">
          <div>
            <input type="number" id="f-parc-atual" placeholder="Parcela atual" min="1">
          </div>
          <div>
            <input type="number" id="f-parc-total" placeholder="Total parcelas" min="1">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Mês de início</label>
        <select id="f-mes"></select>
      </div>
      <button class="btn-primary" id="btn-salvar">Salvar lançamento</button>
    </div>
  </div>
</div>

<!-- PAGE: CONTA -->
<div class="page" id="page-conta">
  <div style="padding: 16px 16px 0">
    <div class="conta-total">
      <div>
        <div class="label">Total mensal fixo</div>
        <div class="val" id="conta-total-val">R$ 0,00</div>
      </div>
      <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="var(--accent)"/></svg>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Gastos fixos mensais</h3></div>
    <div id="conta-items"></div>
  </div>
</div>

<nav>
  <button class="active" onclick="goPage('resumo',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    Resumo
  </button>
  <button onclick="goPage('lanc',this)">

    Novo
  </button>
  <button onclick="goPage('conta',this)">

    Conta
  </button>
</nav>

<div class="toast" id="toast">✓ Lançamento salvo!</div>

function fmt(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtSigned(v) {
  const s = v < 0 ? '-' : '';
  return s + fmt(v);
}
function getValueInMonth(item, monthIdx) {
  const start = MONTH_IDX[item.mesInicio] ?? 0;
  if (item.tipo === 'avista') {
    return start === monthIdx ? item.valor : 0;
  }
  if (item.tipo === 'recorrente') {
    const end = item.mesFim ? (MONTH_IDX[item.mesFim] ?? 10) : 10;
    return (monthIdx >= start && monthIdx <= end) ? item.valor : 0;
  }
  if (item.tipo === 'parcelado') {
    const remaining = item.parcTotal - item.parcAtual + 1;
    const mIdx = monthIdx - start;
    return (mIdx >= 0 && mIdx < remaining) ? item.valor : 0;
  }
  return 0;
}
function contaTotal() {
  return CONTA_FIXA.reduce((s,c)=>s+c.valor,0);
}

function renderResumo() {
  let totalCartoes = 0;
  const byCartao = {};
  const byCat = {};
  items.forEach(item => {
    const v = getValueInMonth(item, currentMonth);
    if (v === 0) return;
    // CONTA items go into CONTA bucket, not cartões
    if (item.cartao === 'CONTA') {
      byCartao['CONTA'] = (byCartao['CONTA']||0) + v;
      byCat[item.cat] = (byCat[item.cat]||0) + v;
      return;
    }
    totalCartoes += v;
    byCartao[item.cartao] = (byCartao[item.cartao]||0) + v;
    byCat[item.cat] = (byCat[item.cat]||0) + v;
  });
  const totalContaFixa = contaTotal();
  const totalContaAvulsa = byCartao['CONTA'] || 0;
  const totalConta = totalContaFixa + totalContaAvulsa;
  byCartao['CONTA'] = totalConta;
  // Add conta fixa cats to byCat
  CONTA_FIXA.forEach(c => {
    byCat[c.cat] = (byCat[c.cat]||0) + c.valor;
  });
  const totalGeral = totalCartoes + totalConta;

  document.getElementById('total-mes').textContent = fmtSigned(totalGeral);
  document.getElementById('header-month').textContent = MONTHS[currentMonth];

  // Breakdown
  const bl = document.getElementById('breakdown-list');
  const cartaoOrder2 = ['MAGALU','SANTANDER','AZUL ITAÚ','RENNER','CONTA'];
  const entries = cartaoOrder2.filter(c => byCartao[c] != null).map(c => [c, byCartao[c]]);
  bl.innerHTML = entries.map(([name,val])=>`
    <div class="breakdown-row">
      <div class="left">
        <div class="breakdown-dot" style="background:${CARTAO_COLORS[name]||'#888'}"></div>
        <span class="name">${name}</span>
      </div>
      <span class="val">${fmt(val)}</span>
    </div>
  `).join('');

  // Categories
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const cl = document.getElementById('cat-list');
  cl.innerHTML = catEntries.map(([cat,val])=>`
    <div class="breakdown-row">
      <div class="left">
        <div class="breakdown-dot" style="background:var(--accent2)"></div>
        <span class="name">${cat}</span>
      </div>
      <span class="val">${fmt(val)}</span>
    </div>
  `).join('');
}

document.querySelectorAll('.tipo-btn').forEach(btn => {

    document.getElementById('parc-fields').classList.toggle('show', show);
  });

document.getElementById('btn-salvar').addEventListener('click', () => {
  const cartao = document.getElementById('f-cartao').value;
  const estab  = document.getElementById('f-estab').value.trim();
  const cat    = document.getElementById('f-cat').value;
  const tipo   = document.querySelector('.tipo-btn.active').dataset.tipo;
  const valor  = parseFloat(document.getElementById('f-valor').value);
  const mes    = document.getElementById('f-mes').value;

  if (!estab || isNaN(valor)) {
    alert('Preencha o estabelecimento e o valor.');
    return;
  }

  const newItem = {
    id: 'u' + Date.now(),
    cartao, estab, cat, tipo, valor,
    mesInicio: mes,
  };

  if (tipo === 'parcelado') {
    const pa = parseInt(document.getElementById('f-parc-atual').value);
    const pt = parseInt(document.getElementById('f-parc-total').value);
    if (!pa || !pt) { alert('Informe as parcelas.'); return; }
    newItem.parcAtual = pa;
    newItem.parcTotal = pt;
  }
  if (tipo === 'recorrente') {
    newItem.mesFim = 'Dez/2026';
  }

  items.push(newItem);
  saveItems(items);

  // Reset form
  document.getElementById('f-estab').value = '';
  document.getElementById('f-valor').value = '';
  document.getElementById('f-parc-atual').value = '';
  document.getElementById('f-parc-total').value = '';

  showToast();
  renderResumo();
  renderExtrato();
});

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='novo') buildMesSelect();
}

function deleteItem(id) {
  if (!confirm('Excluir este lançamento?')) return;
  items = items.filter(i => i.id !== id);
  saveItems(items);
  renderResumo();
  renderExtrato();
}

  function hdr(label, color) {
    return { v: label, t: 's', s: { font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:10}, fill:{fgColor:{rgb:color}}, alignment:{horizontal:'center',vertical:'center',wrapText:true}, border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}} } };
  }

      alignment: {horizontal: center?'center':'left', vertical:'center', wrapText:true},
      border: {top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}
    };

  // ABA 3 — RESUMO MENSAL
  // ══════════════════════════════════
  const resData = [];
  resData.push([hdr('RESUMO MENSAL – TOTAL DE GASTOS (CARTÕES + CONTA FIXA)','1F4E79')]);
  resData.push([hdr('ORIGEM','2E75B6'), ...MONTHS.map(m=>hdr(m,'2E75B6')), hdr('TOTAL GERAL (R$)','2E75B6')]);
  const resColors = {'MAGALU':['D6E4F0','1A5276'],'SANTANDER':['FDECEA','922B21'],'AZUL ITAÚ':['D5F5E3','1E8449'],'RENNER':['F9EBD4','7D4B1E']};
  cartaoOrder.forEach(cartao => {
    const [rowFill, hdrFill] = resColors[cartao]||['FFFFFF','444444'];
    const vals = subtotals[cartao]?.vals || MONTHS.map(()=>0);
    const tot = subtotals[cartao]?.total || 0;
    resData.push([
      cell(`${cartao==='MAGALU'?'🔵':cartao==='SANTANDER'?'🔴':cartao==='AZUL ITAÚ'?'🟢':'🟤'} ${cartao}`,true,hdrFill,'FFFFFF'),
      ...vals.map(v=>numCell(v,false,rowFill)),
      numCell(tot,true,'E2EFDA')
    ]);
  });
  // CONTA row
  const contaVals = MONTHS.map(()=>contaTotal2);
  resData.push([
    cell('💳 CONTA FIXA',true,'1F4E79','FFFFFF'),
    ...contaVals.map(v=>numCell(v,false,'DDEBF7')),
    numCell(contaTotal2*MONTHS.length,true,'E2EFDA')
  ]);
  // TOTAL row
  const grandVals = MONTHS.map((_,mi)=>totalVals[mi]+contaTotal2);
  const grandTotal = grandVals.reduce((s,v)=>s+v,0);
  resData.push([
    hdr('▶  TOTAL GERAL','1F4E79'),
    ...grandVals.map(v=>({v,t:'n',s:{font:{bold:true,name:'Arial',sz:10,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1F4E79'}},alignment:{horizontal:'right',vertical:'center'},numFmt:'R$ #,##0.00',border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}}})),
    numCell(grandTotal,true,'145A32','FFFFFF')
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet(resData);
  ws3['!cols'] = [{wch:18},...MONTHS.map(()=>({wch:13})),{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws3, 'RESUMO MENSAL');

  // Download
  const date = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  XLSX.writeFile(wb, `controle_faturas_${date}.xlsx`);
}

renderMonthSelectors();
renderResumo();
renderExtrato();
renderConta();
</script>
